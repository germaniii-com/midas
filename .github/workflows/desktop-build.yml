name: Desktop Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      sign_macos:
        description: "Sign macOS build with Apple Developer ID"
        type: boolean
        required: true
        default: false

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "20"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            build-cmd: package:mac
            artifact-glob: desktop/release/*.dmg
            artifact-suffix: ${{ (github.event_name == 'workflow_dispatch' && inputs.sign_macos && 'signed') || 'unsigned' }}

          - os: ubuntu-latest
            build-cmd: package:linux
            artifact-glob: desktop/release/*.AppImage
            artifact-suffix: linux

          - os: windows-latest
            build-cmd: package:win
            artifact-glob: desktop/release/*.exe
            artifact-suffix: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        shell: bash
        run: |
          git config --global init.defaultBranch main
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --depth=1 origin +refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/origin/pr
            git checkout -q origin/pr
          else
            git fetch --depth=1 origin ${{ github.sha }}
            git checkout -q ${{ github.sha }}
          fi

      - name: Setup Node.js
        shell: bash
        run: |
          if command -v nvm &>/dev/null; then
            nvm install $NODE_VERSION
            nvm use $NODE_VERSION
          elif command -v fnm &>/dev/null; then
            fnm install $NODE_VERSION
            fnm use $NODE_VERSION
          fi
          echo "node $(node --version)"
          echo "npm v$(npm --version)"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 \
            libxtst6 xdg-utils libatspi2.0-0 \
            libdrm2 libgbm1 \
            fuse rpm \
            libasound2t64 2>/dev/null || \
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 \
            libxtst6 xdg-utils libatspi2.0-0 \
            libdrm2 libgbm1 \
            fuse rpm \
            libasound2 libfuse2 2>/dev/null

      - name: Setup macOS code signing
        if: runner.os == 'macOS' && github.event_name == 'workflow_dispatch' && inputs.sign_macos
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "No CSC_LINK secret found, skipping code signing"
            exit 0
          fi

          echo "Importing Apple Developer certificate ..."
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" -A
          rm /tmp/cert.p12

          # Export for electron-builder
          echo "CSC_LINK=$CSC_LINK" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "Code signing credentials loaded"

      - name: Install project dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build & package desktop app
        run: npm run ${{ matrix.build-cmd }} --workspace=desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notarize macOS build
        if: runner.os == 'macOS' && github.event_name == 'workflow_dispatch' && inputs.sign_macos && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in desktop/release/*.dmg; do
            if [ -f "$dmg" ]; then
              echo "Notarizing $dmg ..."
              xcrun notarytool submit "$dmg" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait
              xcrun stapler staple "$dmg"
            fi
          done

      - name: List release artifacts
        shell: bash
        run: |
          if [ -d desktop/release ]; then
            find desktop/release -type f -ls
          else
            echo "No release directory found"
          fi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Creating release $VERSION ..."

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --repo ${{ github.repository }} || echo "Release may already exist"

          for f in ${{ matrix.artifact-glob }}; do
            if [ -f "$f" ]; then
              echo "Uploading $f ..."
              gh release upload "$VERSION" "$f" \
                --repo ${{ github.repository }} --clobber
            fi
          done
