name: Desktop Build

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        include:
          - os: macos-latest
            build-cmd: package:mac
            artifact-glob: |
              desktop/release/*.dmg
              desktop/release/*.zip
            artifact-name: Midas-macOS
            icon-setup: |
              # No additional setup needed on macOS

          - os: ubuntu-latest
            build-cmd: package:linux
            artifact-glob: |
              desktop/release/*.AppImage
              desktop/release/*.snap
              desktop/release/*.deb
            artifact-name: Midas-Linux
            icon-setup: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq \
                libgtk-3-0 libnotify4 libnss3 libxss1 \
                libxtst6 xdg-utils libatspi2.0-0 \
                libdrm2 libgbm1 libasound2 \
                fuse libfuse2 rpm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install system dependencies
        run: ${{ matrix.icon-setup }}

      - name: Install project dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build & package desktop app
        run: npm run ${{ matrix.build-cmd }} --workspace=desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: ls -laR desktop/release/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-glob }}
          generate_release_notes: true
